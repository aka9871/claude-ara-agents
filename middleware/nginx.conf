# ── ARA Nginx Configuration ────────────────────────────────────────────────────
#
# Add this block to your nginx server{} configuration.
#
# What it does:
#   - Serves /.well-known/ara/ files directly (no PHP/Node overhead)
#   - Redirects known AI bots to /.well-known/ara/digest.md
#   - Adds ARA discovery headers to every HTTP response
#
# Usage:
#   Include this file in your nginx server block:
#   include /path/to/ara.conf;

# ── Detect AI bot User-Agents ─────────────────────────────────────────────────
# Map User-Agent to $is_ai_bot variable (1 = AI bot, 0 = human)
map $http_user_agent $is_ai_bot {
    default             0;
    ~*GPTBot            1;
    ~*ChatGPT-User      1;
    ~*OAI-SearchBot     1;
    ~*ClaudeBot         1;
    ~*anthropic-ai      1;
    ~*PerplexityBot     1;
    ~*YouBot            1;
    ~*Google-Extended   1;
    ~*Gemini            1;
    ~*Bytespider        1;
    ~*FacebookBot       1;
    ~*Applebot          1;
    ~*cohere-ai         1;
    ~*AI2Bot            1;
}

server {
    # ── ARA discovery headers on every response ──────────────────────────────
    # These tell any agent where to find the ARA manifest,
    # even without prior knowledge of the ARA standard.
    add_header Link '</.well-known/ara/manifest.json>; rel="ara-manifest", </.well-known/ara/digest.md>; rel="ara-digest"' always;
    add_header X-ARA-Manifest '/.well-known/ara/manifest.json' always;
    add_header X-ARA-Version '1.0' always;

    # ── Serve /.well-known/ara/ files directly ────────────────────────────────
    location /.well-known/ara/ {
        # Serve from filesystem — fast, no app server overhead
        root /var/www/html;  # adjust to your webroot
        default_type application/json;

        # digest.md is plain text / markdown
        location ~ \.md$ {
            default_type text/markdown;
        }

        # Allow public access, no auth
        auth_basic off;
        try_files $uri $uri/ =404;
    }

    # ── AI bot content negotiation ────────────────────────────────────────────
    # When an AI crawler visits any page, redirect to the ARA digest.
    # The digest is ~300 tokens — vs ~50,000 tokens of HTML to parse.
    # This saves the AI system 150x in token cost while giving richer context.
    location / {
        if ($is_ai_bot) {
            return 302 /.well-known/ara/digest.md;
        }

        # Normal request handling (adjust to your setup)
        try_files $uri $uri/ /index.php?$query_string;
    }
}
